name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint MDX files
        run: |
          echo "Checking MDX files for syntax errors..."
          # Build will fail if MDX has syntax errors
          npm run build

      - name: Validate frontmatter
        run: |
          echo "Validating frontmatter schema..."
          # Check for required frontmatter fields in articles
          node -e "
          const fs = require('fs');
          const path = require('path');
          const articlesDir = './content/articles';

          if (!fs.existsSync(articlesDir)) {
            console.log('No articles directory found');
            process.exit(0);
          }

          const files = fs.readdirSync(articlesDir).filter(f => f.endsWith('.mdx'));
          let errors = 0;

          files.forEach(file => {
            const content = fs.readFileSync(path.join(articlesDir, file), 'utf-8');
            const frontmatterMatch = content.match(/^---\n([\s\S]*?)\n---/);

            if (!frontmatterMatch) {
              console.error(\`❌ \${file}: Missing frontmatter\`);
              errors++;
              return;
            }

            const frontmatter = frontmatterMatch[1];
            const requiredFields = ['title', 'publishDate'];

            requiredFields.forEach(field => {
              if (!frontmatter.includes(\`\${field}:\`)) {
                console.error(\`❌ \${file}: Missing required field '\${field}'\`);
                errors++;
              }
            });
          });

          if (errors > 0) {
            console.error(\`\n❌ Found \${errors} validation error(s)\`);
            process.exit(1);
          }

          console.log(\`✅ All \${files.length} articles validated successfully\`);
          "

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Deployment notification
        if: failure()
        run: |
          echo "❌ Deployment failed! Check logs above for details."
          exit 1

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: failure()
    steps:
      - name: Notification
        run: |
          echo "🚨 Deployment pipeline failed!"
          echo "Check the GitHub Actions logs for details."
          # Add actual notification service here (Slack, email, etc.)

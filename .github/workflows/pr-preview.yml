name: PR Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate Changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and validate
        run: |
          echo "Building and validating content..."
          npm run build

      - name: Check for broken links
        run: |
          echo "Checking for broken internal links..."
          # Simple check for common broken link patterns
          if grep -r "href=\"#\"" content/ 2>/dev/null; then
            echo "⚠️  Warning: Found empty href attributes"
          fi
          echo "✅ Link check complete"

  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy Preview to Vercel
        uses: amondnet/vercel-action@v25
        id: deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          alias-domains: |
            pr-${{ github.event.pull_request.number }}.zakitpro.com

      - name: Comment preview URL
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: `## 🚀 Preview Deployment Ready!\n\n✅ Your changes have been deployed to a preview environment.\n\n**Preview URL:** ${{ steps.deploy.outputs.preview-url }}\n\nThe preview will update automatically with new commits to this PR.`
            })
